<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="/logoThree.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="/logoThree.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/logoThree.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bellatrix</title>

  <!-- Preconnect to API origin for faster first requests -->
  <link rel="preconnect" href="https://www.bellatrixinc.com" crossorigin />
  <link rel="dns-prefetch" href="https://www.bellatrixinc.com" />

  <!-- Preconnect to Google Fonts if used -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Preload hero video so it starts downloading immediately -->
  <link rel="preload" as="video" href="/Videos/implementation/homepage_hero.mp4" type="video/mp4" />

  <!-- Inline critical CSS for instant dark hero background before JS loads -->
  <style>
    #root { min-height: 100dvh; }
    /* Instant dark hero placeholder — visible before React mounts */
    .hero-instant-bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    }
  </style>

</head>

<body>
  <div id="root">
    <!-- Instant dark hero background — removed by React on mount -->
    <div class="hero-instant-bg" aria-hidden="true"></div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
